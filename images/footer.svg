<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 1280 172" width="1280" height="172" role="img"
     aria-label="ZCU102 project footer">
  <defs>
    <linearGradient id="fsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#050810"/>
      <stop offset="0.5" stop-color="#070B14"/>
      <stop offset="1" stop-color="#0A1322"/>
    </linearGradient>
    <linearGradient id="frule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFB400" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#FFB400" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#FFB400" stop-opacity="0"/>
    </linearGradient>
    <pattern id="fgrid" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#16314A"/>
    </pattern>
    <filter id="fsoft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <path id="wave" d="M -20,58 H 26 V 86 H 72 V 58 H 118 V 86 H 164 V 58 H 210 V 86 H 256 V 58 H 302 V 86 H 348 V 58 H 394 V 86 H 440 V 58 H 486 V 86 H 532 V 58 H 578 V 86 H 624 V 58 H 670 V 86 H 716 V 58 H 762 V 86 H 808 V 58 H 854 V 86 H 900 V 58 H 946 V 86 H 992 V 58 H 1038 V 86 H 1084 V 58 H 1130 V 86 H 1176 V 58 H 1222 V 86 H 1268 V 58 H 1314 V 86 H 1320"/>
    <style>
      .led  { animation: led 1.6s ease-in-out infinite; }
      .led2 { animation: led 1.6s ease-in-out infinite; animation-delay:.8s; }
      @keyframes led { 0%,100%{opacity:1} 50%{opacity:.2} }
      @media (prefers-reduced-motion: reduce){ .led,.led2{animation:none} }
    </style>
  </defs>

  <rect width="1280" height="172" fill="url(#fsky)"/>
  <rect width="1280" height="172" fill="url(#fgrid)" opacity="0.55"/>

  <!-- top hairline -->
  <rect x="0" y="0" width="1280" height="2" fill="url(#frule)"/>

  <!-- digital logic signal -->
  <use href="#wave" xlink:href="#wave" fill="none" stroke="#15997F" stroke-width="2.4" opacity="0.55"/>
  <use href="#wave" xlink:href="#wave" fill="none" stroke="#1FD7B6" stroke-width="2.4" opacity="0.22"/>
  <circle r="4" fill="#9CFCE8" filter="url(#fsoft)">
    <animateMotion dur="6s" repeatCount="indefinite"><mpath href="#wave" xlink:href="#wave"/></animateMotion>
  </circle>

  <!-- end LEDs -->
  <circle class="led"  cx="36"   cy="72" r="4" fill="#1FD7B6"/>
  <circle class="led2" cx="1244" cy="72" r="4" fill="#FFB400"/>

  <!-- attribution -->
  <text x="640" y="124" text-anchor="middle" fill="#C7D6E4"
        font-family="'SFMono-Regular','Consolas','Courier New',monospace"
        font-size="13.5" letter-spacing="2.5">&#169; 2025 &#160; ALI MEHRPOOYA &#160;&#183;&#160; SMART INTERNET LAB / HPN GROUP &#160;&#183;&#160; UNIVERSITY OF BRISTOL</text>
  <text x="640" y="148" text-anchor="middle" fill="#6E84A0"
        font-family="'SFMono-Regular','Consolas','Courier New',monospace"
        font-size="11.5" letter-spacing="2">PetaLinux 2024.1 &#160;&#183;&#160; ZCU102 Rev 1.0 &#160;&#183;&#160; XCZU9EG-2FFVB1156E &#160;&#183;&#160; MIT LICENSE &#160;&#183;&#160; v1.0.0</text>

  <!-- registration brackets -->
  <g stroke="#2C5066" stroke-width="1.6" fill="none">
    <path d="M 22,150 H 58 M 22,150 V 120"/>
    <path d="M 1258,150 H 1222 M 1258,150 V 120"/>
  </g>
</svg>
