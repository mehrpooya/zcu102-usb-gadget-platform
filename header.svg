<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 1280 340" width="1280" height="340" role="img"
     aria-label="ZCU102 USB Gadget and NVMe Platform">
  <defs>
    <!-- Palette: substrate #070B14, trace teal #1FD7B6, immersion-gold #FFB400, silkscreen #E6EDF3 -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0A1322"/>
      <stop offset="0.55" stop-color="#070B14"/>
      <stop offset="1" stop-color="#050810"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.62">
      <stop offset="0" stop-color="#0E5C50" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#0E5C50" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFB400" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#FFB400"/>
      <stop offset="1" stop-color="#FFB400" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="scanbar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1FD7B6" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#1FD7B6" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#1FD7B6" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#16314A"/>
    </pattern>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- PCB trace routes -->
    <path id="tA" d="M -20,58 H 300 L 356,102 H 980 L 1036,58 H 1300"/>
    <path id="tB" d="M -20,92 H 196 L 246,52 H 1032 L 1086,96 H 1300"/>
    <path id="tC" d="M -20,272 H 356 L 414,302 H 876 L 936,272 H 1300"/>
    <path id="tD" d="M -20,304 H 256 L 318,264 H 980 L 1040,306 H 1300"/>

    <style>
      .blink   { animation: blink 1.5s ease-in-out infinite; }
      .blink2  { animation: blink 1.5s ease-in-out infinite; animation-delay: .5s; }
      .blink3  { animation: blink 1.5s ease-in-out infinite; animation-delay: 1s; }
      .scan    { animation: scan 7s linear infinite; }
      .grow    { transform-box: fill-box; transform-origin: center; animation: grow 2.4s cubic-bezier(.2,.8,.2,1) forwards; }
      .die     { animation: pulseGlow 4s ease-in-out infinite; }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.18} }
      @keyframes scan  { 0%{transform:translateX(-260px);opacity:0} 8%{opacity:1} 92%{opacity:1} 100%{transform:translateX(1320px);opacity:0} }
      @keyframes grow  { from{transform:scaleX(0)} to{transform:scaleX(1)} }
      @keyframes pulseGlow { 0%,100%{opacity:.08} 50%{opacity:.16} }
      @media (prefers-reduced-motion: reduce){
        .blink,.blink2,.blink3,.scan,.die{animation:none}
        .grow{animation:none;transform:scaleX(1)}
      }
    </style>
  </defs>

  <!-- substrate -->
  <rect width="1280" height="340" fill="url(#sky)"/>
  <rect width="1280" height="340" fill="url(#grid)" opacity="0.6"/>
  <rect width="1280" height="340" fill="url(#glow)"/>

  <!-- silicon die watermark behind the title -->
  <g class="die" fill="none" stroke="#1FD7B6" opacity="0.1">
    <rect x="430" y="126" width="420" height="120" rx="14" stroke-width="2"/>
    <g fill="#1FD7B6" stroke="none">
      <!-- BGA dot field -->
      <g>
        <circle cx="492" cy="152" r="2.2"/><circle cx="524" cy="152" r="2.2"/><circle cx="556" cy="152" r="2.2"/><circle cx="588" cy="152" r="2.2"/><circle cx="692" cy="152" r="2.2"/><circle cx="724" cy="152" r="2.2"/><circle cx="756" cy="152" r="2.2"/><circle cx="788" cy="152" r="2.2"/>
        <circle cx="492" cy="190" r="2.2"/><circle cx="524" cy="190" r="2.2"/><circle cx="556" cy="190" r="2.2"/><circle cx="588" cy="190" r="2.2"/><circle cx="692" cy="190" r="2.2"/><circle cx="724" cy="190" r="2.2"/><circle cx="756" cy="190" r="2.2"/><circle cx="788" cy="190" r="2.2"/>
      </g>
    </g>
  </g>

  <!-- traces -->
  <g fill="none" stroke="#16A88F" stroke-width="2" stroke-linejoin="round" opacity="0.7">
    <use href="#tA" xlink:href="#tA"/>
    <use href="#tB" xlink:href="#tB"/>
    <use href="#tC" xlink:href="#tC"/>
    <use href="#tD" xlink:href="#tD"/>
  </g>

  <!-- gold vias at the bends -->
  <g fill="#FFB400">
    <circle cx="300" cy="58" r="3.4"/><circle cx="356" cy="102" r="3.4"/><circle cx="980" cy="102" r="3.4"/><circle cx="1036" cy="58" r="3.4"/>
    <circle cx="196" cy="92" r="3.4"/><circle cx="246" cy="52" r="3.4"/><circle cx="1032" cy="52" r="3.4"/><circle cx="1086" cy="96" r="3.4"/>
    <circle cx="356" cy="272" r="3.4"/><circle cx="414" cy="302" r="3.4"/><circle cx="876" cy="302" r="3.4"/><circle cx="936" cy="272" r="3.4"/>
    <circle cx="256" cy="304" r="3.4"/><circle cx="318" cy="264" r="3.4"/><circle cx="980" cy="264" r="3.4"/><circle cx="1040" cy="306" r="3.4"/>
  </g>

  <!-- flowing signal pulses -->
  <g fill="#9CFCE8" filter="url(#soft)">
    <circle r="3.4"><animateMotion dur="4.2s" repeatCount="indefinite" begin="0s"><mpath href="#tA" xlink:href="#tA"/></animateMotion></circle>
    <circle r="3.4"><animateMotion dur="5.0s" repeatCount="indefinite" begin="1.1s"><mpath href="#tB" xlink:href="#tB"/></animateMotion></circle>
    <circle r="3.4"><animateMotion dur="4.6s" repeatCount="indefinite" begin="2.0s"><mpath href="#tC" xlink:href="#tC"/></animateMotion></circle>
    <circle r="3.4"><animateMotion dur="5.4s" repeatCount="indefinite" begin="0.6s"><mpath href="#tD" xlink:href="#tD"/></animateMotion></circle>
  </g>

  <!-- scan sweep -->
  <rect class="scan" x="0" y="0" width="220" height="340" fill="url(#scanbar)"/>

  <!-- title block -->
  <text x="640" y="118" text-anchor="middle" fill="#1FD7B6"
        font-family="'SFMono-Regular','Consolas','Courier New',monospace"
        font-size="13" letter-spacing="5">SMART INTERNET LAB &#183; HPN GROUP &#183; UNIVERSITY OF BRISTOL</text>

  <text x="640" y="176" text-anchor="middle" fill="#E6EDF3"
        font-family="'Segoe UI','SF Pro Display',system-ui,sans-serif"
        font-size="48" font-weight="800" letter-spacing="0.5">ZCU102 USB GADGET &amp; NVMe</text>

  <rect class="grow" x="450" y="196" width="380" height="2.5" fill="url(#rule)"/>

  <text x="640" y="226" text-anchor="middle" fill="#7E93AC"
        font-family="'SFMono-Regular','Consolas','Courier New',monospace"
        font-size="14" letter-spacing="2">Zynq UltraScale+ MPSoC &#160;&#183;&#160; PetaLinux 2024.1 &#160;&#183;&#160; Linux 6.6.10-xilinx</text>

  <!-- three live gadget functions: one cable, three devices -->
  <g font-family="'SFMono-Regular','Consolas','Courier New',monospace" font-size="12.5" letter-spacing="1.5">
    <g transform="translate(372,250)">
      <rect width="160" height="30" rx="15" fill="#0B1A2A" stroke="#16A88F" stroke-width="1"/>
      <circle class="blink"  cx="20" cy="15" r="4" fill="#1FD7B6"/>
      <text x="36" y="19" fill="#A9C2D6">RNDIS ETHERNET</text>
    </g>
    <g transform="translate(548,250)">
      <rect width="184" height="30" rx="15" fill="#0B1A2A" stroke="#C98A12" stroke-width="1"/>
      <circle class="blink2" cx="20" cy="15" r="4" fill="#FFB400"/>
      <text x="36" y="19" fill="#A9C2D6">USB MASS STORAGE</text>
    </g>
    <g transform="translate(748,250)">
      <rect width="160" height="30" rx="15" fill="#0B1A2A" stroke="#16A88F" stroke-width="1"/>
      <circle class="blink3" cx="20" cy="15" r="4" fill="#1FD7B6"/>
      <text x="36" y="19" fill="#A9C2D6">CDC-ACM SERIAL</text>
    </g>
  </g>

  <!-- engineering registration brackets -->
  <g stroke="#2C5066" stroke-width="1.6" fill="none">
    <path d="M 22,22 H 58 M 22,22 V 58"/>
    <path d="M 1258,22 H 1222 M 1258,22 V 58"/>
    <path d="M 22,318 H 58 M 22,318 V 282"/>
    <path d="M 1258,318 H 1222 M 1258,318 V 282"/>
  </g>
</svg>
