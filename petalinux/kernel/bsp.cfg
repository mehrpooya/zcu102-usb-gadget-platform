# ── Filesystem ────────────────────────────────────────────────────────────────
CONFIG_EXFAT_FS=y
CONFIG_EXFAT_DEFAULT_IOCHARSET="utf8"
CONFIG_NTFS_FS=y
CONFIG_NTFS_DEBUG=y
CONFIG_NTFS_RW=y
CONFIG_NTFS3_FS=y
CONFIG_NTFS3_LZX_XPRESS=y
CONFIG_NTFS3_FS_POSIX_ACL=y

# ── NVMe ──────────────────────────────────────────────────────────────────────
CONFIG_NVME_CORE=y
CONFIG_BLK_DEV_NVME=y
CONFIG_NVME_MULTIPATH=y
CONFIG_NVME_VERBOSE_ERRORS=y
CONFIG_NVME_HWMON=y

# ── USB DWC3 role  (GADGET=peripheral-only; use DUAL_ROLE if you need host too)
CONFIG_USB_DWC3=y
# CONFIG_USB_DWC3_GADGET=y
CONFIG_USB_DWC3_DUAL_ROLE=y
# CONFIG_USB_DWC3_HOST is not set
# CONFIG_USB_DWC3_DUAL_ROLE is not set

# ── USB Gadget framework ───────────────────────────────────────────────────────
CONFIG_USB_GADGET=y
CONFIG_CONFIGFS_FS=y
CONFIG_USB_LIBCOMPOSITE=m
CONFIG_USB_CONFIGFS=m

# NCM / ECM / RNDIS
CONFIG_USB_CONFIGFS_NCM=y
CONFIG_USB_CONFIGFS_ECM=y
CONFIG_USB_CONFIGFS_ECM_SUBSET=n
CONFIG_USB_CONFIGFS_RNDIS=y
CONFIG_USB_F_NCM=m
CONFIG_USB_F_ECM=m
CONFIG_USB_F_RNDIS=m

# CDC ACM (virtual serial port)
CONFIG_USB_CONFIGFS_ACM=y
CONFIG_USB_F_ACM=m
CONFIG_USB_U_SERIAL=m

# Mass storage
CONFIG_USB_CONFIGFS_MASS_STORAGE=y
CONFIG_USB_F_MASS_STORAGE=m

# Legacy g_ether (optional quick-test gadget)
CONFIG_USB_ETH=m
CONFIG_USB_ETH_RNDIS=y

# ── USB MUSB (from user_2026-05-27) ───────────────────────────────────────────
# CONFIG_HISI_HIKEY_USB is not set
CONFIG_USB_MUSB_HDRC=y
CONFIG_USB_MUSB_DUAL_ROLE=y
CONFIG_USB_DWC3_DUAL_ROLE=y   # ← remove this line if you keep GADGET above
CONFIG_USB_ROLE_SWITCH=y

# ── Input / HID ───────────────────────────────────────────────────────────────
CONFIG_INPUT_EVDEV=y
CONFIG_INPUT_MOUSE=y
CONFIG_INPUT_KEYBOARD=y
CONFIG_INPUT_MOUSEDEV=y
CONFIG_INPUT_MOUSEDEV_SCREEN_X=1920
CONFIG_INPUT_MOUSEDEV_SCREEN_Y=1080
CONFIG_MOUSE_PS2=y
CONFIG_MOUSE_PS2_ALPS=y
CONFIG_MOUSE_PS2_BYD=y
CONFIG_MOUSE_PS2_LOGIPS2PP=y
CONFIG_MOUSE_PS2_SYNAPTICS=y
CONFIG_MOUSE_PS2_SYNAPTICS_SMBUS=y
CONFIG_MOUSE_PS2_CYPRESS=y
CONFIG_MOUSE_PS2_TRACKPOINT=y
CONFIG_MOUSE_PS2_FOCALTECH=y
CONFIG_MOUSE_PS2_SMBUS=y
CONFIG_HID_GENERIC=y
CONFIG_USB_HID=y

# ── USB storage / camera / video ──────────────────────────────────────────────
CONFIG_USB_STORAGE=y
CONFIG_USB_VIDEO_CLASS=y
CONFIG_MEDIA_CAMERA_SUPPORT=y
CONFIG_V4L_PLATFORM_DRIVERS=y

# ── Xilinx DMA ────────────────────────────────────────────────────────────────
CONFIG_XILINX_DMA=y
CONFIG_XILINX_ZYNQMP_DMA=y
CONFIG_XILINX_ZYNQMP_DPDMA=y

# ── Audio ─────────────────────────────────────────────────────────────────────
CONFIG_SOUND=y
CONFIG_SND=y
CONFIG_SND_SOC=y
CONFIG_SND_SOC_XILINX_DP=y

# ── CMA / DMA ─────────────────────────────────────────────────────────────────
CONFIG_CMA=y
CONFIG_DMA_CMA=y
CONFIG_CMA_SIZE_MBYTES=256

# ── Display / DRM ─────────────────────────────────────────────────────────────
CONFIG_DRM_XLNX=y
CONFIG_DRM_XLNX_BRIDGE=y
CONFIG_DRM_XLNX_BRIDGE_DEBUG_FS=y
CONFIG_DRM_ZYNQMP_DPSUB=y